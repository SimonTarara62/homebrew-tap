name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # On a private repo the runner's git context forces authenticated access to
      # github.com, which breaks Homebrew's anonymous clones of homebrew-core.
      # Inject the workflow token for all github.com git operations.
      - name: Authenticate git to github.com
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      # Modern Homebrew rejects installing a bare formula path; expose the
      # checkout as the tap by symlinking it into Homebrew's Taps directory, so
      # the formula installs as SimonTarara62/tap/capctl (the real user path).
      - name: Link the checkout as a tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/simontarara62/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew tap

      - name: Install formula from source
        run: brew install --build-from-source --verbose SimonTarara62/tap/capctl

      - name: Run formula test block
        run: brew test SimonTarara62/tap/capctl

      - name: Audit formula
        continue-on-error: true
        run: brew audit --tap SimonTarara62/tap capctl
