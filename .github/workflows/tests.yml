name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # actions/checkout configures git to use the repo token, which can break
      # Homebrew's anonymous clones of homebrew-core; inject the token for all
      # github.com git operations so setup-homebrew's fetches authenticate.
      - name: Authenticate git to github.com
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      # Modern Homebrew rejects installing a bare formula path; expose the
      # checkout as the tap by symlinking it into Homebrew's Taps directory, so
      # the formula installs as SimonTarara62/tap/capctl (the real user path).
      - name: Link the checkout as a tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/simontarara62/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew tap

      - name: Install formula from source
        run: brew install --build-from-source --verbose SimonTarara62/tap/capctl

      - name: Run formula test block
        run: brew test SimonTarara62/tap/capctl

      - name: Audit formula
        continue-on-error: true
        run: brew audit --tap SimonTarara62/tap capctl

  # End-to-end smoke test of the REAL user path: tap the published public repo
  # over the network and install, with no checkout/symlink. This is exactly what
  # `brew install SimonTarara62/tap/capctl` does on a user's machine.
  install-from-public-tap:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install exactly as a user would
        run: brew install SimonTarara62/tap/capctl

      - name: Verify capctl runs
        run: capctl --version
