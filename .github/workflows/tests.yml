name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # On a private repo the runner's git context forces authenticated access to
      # github.com, which breaks Homebrew's anonymous clones of homebrew-core.
      # Inject the workflow token for all github.com git operations.
      - name: Authenticate git to github.com
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install formula from source
        run: brew install --build-from-source --verbose ./Formula/capctl.rb

      - name: Run formula test block
        run: brew test ./Formula/capctl.rb

      - name: Audit formula
        continue-on-error: true
        run: brew audit --formula ./Formula/capctl.rb
